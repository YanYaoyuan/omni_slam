name: ROS 2 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  humble-build:
    name: Humble colcon build
    runs-on: ubuntu-22.04
    container: ros:humble-ros-base-jammy

    defaults:
      run:
        shell: bash

    env:
      ROS_DISTRO: humble
      ROS_WS: /tmp/ros_ws
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            git \
            libeigen3-dev \
            libpcl-dev \
            libpython3-dev \
            python3-colcon-common-extensions \
            python3-matplotlib \
            python3-rosdep \
            rsync \
            shellcheck \
            ros-${ROS_DISTRO}-common-interfaces \
            ros-${ROS_DISTRO}-octomap-ros \
            ros-${ROS_DISTRO}-pcl-conversions \
            ros-${ROS_DISTRO}-pcl-ros \
            ros-${ROS_DISTRO}-tf2-eigen \
            ros-${ROS_DISTRO}-tf2-geometry-msgs \
            ros-${ROS_DISTRO}-tf2-ros \
            ros-${ROS_DISTRO}-visualization-msgs
          rosdep init || true
          rosdep update --rosdistro ${ROS_DISTRO}

      - name: Create CI Livox message stub
        run: |
          mkdir -p ${ROS_WS}/src/livox_ros_driver2/msg
          cat > ${ROS_WS}/src/livox_ros_driver2/package.xml <<'PKG'
          <?xml version="1.0"?>
          <package format="3">
            <name>livox_ros_driver2</name>
            <version>0.0.0</version>
            <description>CI-only Livox message interface stub.</description>
            <maintainer email="ci@example.com">CI</maintainer>
            <license>Apache-2.0</license>
            <buildtool_depend>ament_cmake</buildtool_depend>
            <buildtool_depend>rosidl_default_generators</buildtool_depend>
            <depend>std_msgs</depend>
            <exec_depend>rosidl_default_runtime</exec_depend>
            <member_of_group>rosidl_interface_packages</member_of_group>
            <export>
              <build_type>ament_cmake</build_type>
            </export>
          </package>
          PKG
          cat > ${ROS_WS}/src/livox_ros_driver2/CMakeLists.txt <<'CMAKE'
          cmake_minimum_required(VERSION 3.8)
          project(livox_ros_driver2)
          find_package(ament_cmake REQUIRED)
          find_package(rosidl_default_generators REQUIRED)
          find_package(std_msgs REQUIRED)
          rosidl_generate_interfaces(${PROJECT_NAME}
            msg/CustomPoint.msg
            msg/CustomMsg.msg
            DEPENDENCIES std_msgs
          )
          ament_export_dependencies(rosidl_default_runtime)
          ament_package()
          CMAKE
          cat > ${ROS_WS}/src/livox_ros_driver2/msg/CustomPoint.msg <<'MSG'
          uint32 offset_time
          float32 x
          float32 y
          float32 z
          uint8 reflectivity
          uint8 tag
          uint8 line
          MSG
          cat > ${ROS_WS}/src/livox_ros_driver2/msg/CustomMsg.msg <<'MSG'
          std_msgs/Header header
          uint64 timebase
          uint32 point_num
          uint8 lidar_id
          uint8[3] rsvd
          CustomPoint[] points
          MSG

      - name: Prepare colcon workspace
        run: |
          mkdir -p ${ROS_WS}/src/omni_slam
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.vscode' \
            --exclude='build' \
            --exclude='build_orin' \
            --exclude='dist' \
            --exclude='install' \
            --exclude='install_orin' \
            --exclude='log' \
            --exclude='ros_logs' \
            --exclude='toolchains/aarch64--glibc--stable-final' \
            ${GITHUB_WORKSPACE}/ ${ROS_WS}/src/omni_slam/

      - name: Install ROS package dependencies
        run: |
          source /opt/ros/${ROS_DISTRO}/setup.bash
          cd ${ROS_WS}
          rosdep install \
            --from-paths src \
            --ignore-src \
            --rosdistro ${ROS_DISTRO} \
            --skip-keys livox_ros_driver2 \
            -y

      - name: Lint shell scripts
        run: shellcheck scripts/*.sh

      - name: Build ROS packages
        run: |
          source /opt/ros/${ROS_DISTRO}/setup.bash
          cd ${ROS_WS}
          colcon build \
            --packages-select livox_ros_driver2 fast_lio icp_relocalization \
            --event-handlers console_direct+ \
            --cmake-args -DCMAKE_BUILD_TYPE=Release

      - name: Run package tests
        run: |
          source /opt/ros/${ROS_DISTRO}/setup.bash
          source ${ROS_WS}/install/setup.bash
          cd ${ROS_WS}
          colcon test --packages-select fast_lio icp_relocalization --event-handlers console_direct+
          colcon test-result --verbose

      - name: Upload colcon logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: colcon-logs
          path: /tmp/ros_ws/log
